spring:
  application:
    name: gateway-micro-service

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: USERS-MICRO-SERVER
          uri: lb://USERS-MICRO-SERVER
          predicates:
            - Path=/api/user/**

        - id: SALON-MICRO-SERVER
          uri: lb://SALON-MICRO-SERVER
          predicates:
            - Path=/api/salon/**

        - id: CATEGORY-SERVER
          uri: lb://CATEGORY-SERVER
          predicates:
            - Path=/api/category/**

        - id: BOOKING-SERVICE-SERVER
          uri: lb://BOOKING-SERVICE-SERVER
          predicates:
            - Path=/api/booking-service/**

        - id: AUTH-SERVER
          uri: lb://AUTH-SERVER
          predicates:
            - Path=/api/v1/auth/**, /api/v2/admin/**

        - id: PAYMENT-SERVER
          uri: lb://PAYMENT-SERVER
          predicates:
            - Path=/api/payment/**

        - id: SERVICE-OFFERING-SERVER
          uri: lb://SERVICE-OFFERING-SERVER
          predicates:
            - Path=/api/service-offer/**, /api/service-offering/**

server:
  port: 5000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8060/eureka/
    register-with-eureka: true
    fetch-registry: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG