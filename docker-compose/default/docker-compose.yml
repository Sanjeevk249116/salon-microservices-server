services:
  eurekaserver:
    image: "sanjeevksuhwaha/salon-eureka-server:v1"
    container_name: eurekaserver
    ports:
      - "8060:8060"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:8060/actuator/health | grep UP || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - sanjeevkushwaha

  mysql:
    image: mysql:8
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Sanjeev@99
      TZ: Asia/Kolkata  # Set timezone
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./mysql-conf:/etc/mysql/conf.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-pSanjeev@99" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - sanjeevkushwaha

  usermicroserver:
    image: "sanjeevksuhwaha/salon-user-service:v2"
    container_name: usermicroserver
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: USERS-MICRO-SERVER
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/user_salon?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Sanjeev@99
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_DEVTOOLS_RESTART_ENABLED: "false"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: "http://eurekaserver:8060/eureka/"
      JAVA_OPTS: "-Xms512m -Xmx1024m"  # JVM memory settings
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail --silent http://localhost:5001/actuator/health | grep UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    networks:
      - sanjeevkushwaha

  salonmicroservice:
    image: "sanjeevksuhwaha/salon-service:v2"
