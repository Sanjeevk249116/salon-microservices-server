spring:
  application:
    name: eureka-server
  output:
    ansi:
      enabled: ALWAYS

server:
  port: 8060

eureka:
  instance:
    hostname: localhost
  client:
    fetch-registry: false
    register-with-eureka: false
    service-url:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/