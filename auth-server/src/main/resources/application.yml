spring:
  application:
    name: AUTH-SERVER

  devtools:
    livereload:
      enabled: true
    restart:
      enabled: true
      exclude: static/**, public/**, templates/**

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/auth_server
    username: root
    password: ${DB_PASSWORD:Sanjeev@99}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 5008
  error:
    include-stacktrace: never
    include-message: never

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8060/eureka/
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

jwt:
  secret: bXktc2VjcmV0LWtleS0xMjM0NTY3ODkwMTIzNDU2o4387qry87m7x748y7q7y0a898w8adwe87ny7ze9ya37ty97ew
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

flyway:
  enabled: true
  baseline-on-migrate: true
  locations: classpath:db/migration